version: '3.8'

services:
  frontend:
    build:
      context: ./front-end
      args:
        VITE_API_BASE_URL: https://chat.aytraders.com/api
    ports:
      - "3001:5173"       # expose to host so NPM can reach it
    networks:
      - chat-network

  chat-service:
    build:
      context: ./chat-service
    expose:
      - "5000"            # internal only, no host port needed
    environment:
      - PORT=5000
      - ALLOWED_ORIGINS=https://chat.aytraders.com
    depends_on:
      - mongo
    networks:
      - chat-network

  user-service:
    build:
      context: ./user-service
    expose:
      - "5001"
    environment:
      - PORT=5001
      - ALLOWED_ORIGINS=https://chat.aytraders.com
    depends_on:
      - mongo
    networks:
      - chat-network

  auth-service:
    build:
      context: ./auth-service
    expose:
      - "5002"
    environment:
      - PORT=5002
      - ALLOWED_ORIGINS=https://chat.aytraders.com
    depends_on:
      - mongo
    networks:
      - chat-network

  mongo:
    image: mongo:6
    volumes:
      - mongo-data:/data/db
    networks:
      - chat-network

volumes:
  mongo-data:

networks:
  chat-network:             # simple internal network, no external needed